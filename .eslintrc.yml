root: true
parserOptions:
  ecmaVersion: 2022
  sourceType: module
env:
  node: true
  es2022: true
ignorePatterns:
  - dist
  - node_modules
  - "**/*.d.ts"
overrides:
  - files: ["**/*.ts", "**/*.tsx"]
    parser: "@typescript-eslint/parser"
    parserOptions:
      project: false
    plugins:
      - "@typescript-eslint"
    extends:
      - eslint:recommended
      - plugin:@typescript-eslint/recommended
    rules:
      "@typescript-eslint/no-floating-promises": "off"
      "@typescript-eslint/no-unused-vars":
        - "warn"
        - { argsIgnorePattern: "^_", varsIgnorePattern: "^_" }
      "@typescript-eslint/no-explicit-any": "warn"
      "no-console": "warn"
