# Render blueprint — one-shot provisioning for the TCG Toolkit stack.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tcg-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build --workspace=@tcg/shared && npm run build --workspace=@tcg/api
    preDeployCommand: npm ci --include=dev && npm run build --workspace=@tcg/shared && npm run build --workspace=@tcg/api && npm run db:migrate --workspace=@tcg/api
    startCommand: node apps/api/dist/server/main.js
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: tcg-shared-env
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tcg-redis
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: tcg-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build --workspace=@tcg/shared && npm run build --workspace=@tcg/api
    startCommand: npm run db:migrate --workspace=@tcg/api && node apps/api/dist/jobs/worker.js
    autoDeploy: true
    envVars:
      - fromGroup: tcg-shared-env
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tcg-redis
          property: connectionString

  - type: cron
    name: tcg-nightly-catalog
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    schedule: '0 7 * * *'
    buildCommand: npm ci --include=dev && npm run build --workspace=@tcg/shared && npm run build --workspace=@tcg/api
    startCommand: npm run db:migrate --workspace=@tcg/api && node apps/api/dist/jobs/cron/catalog-sync.js
    envVars:
      - fromGroup: tcg-shared-env
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tcg-redis
          property: connectionString

  - type: web
    name: tcg-web
    runtime: static
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build --workspace=@tcg/shared && npm run build --workspace=@tcg/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLOVER_DEVICE_ID
        sync: false

  - type: keyvalue
    name: tcg-redis
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

envVarGroups:
  - name: tcg-shared-env
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: PG_SSL_REJECT_UNAUTHORIZED
        value: 'false'
      - key: JWT_SECRET
        generateValue: true
      - key: CONFIG_ENCRYPTION_KEY
        generateValue: true
      - key: CLOVER_WEBHOOK_SIGNATURE_HEADER
        value: x-clover-signature
